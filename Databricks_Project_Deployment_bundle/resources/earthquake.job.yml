resources:
  jobs:
    testproject_dev_end_to_end_job:
      name: testproject_dev_end_to_end_job
      tasks:
        - task_key: Ingestion_to_bronze
          notebook_task:
            notebook_path: ../src/Notebooks/Ingestion to bronze.ipynb
            base_parameters:
              catalog_name: ${var.catalog}
            source: WORKSPACE
        - task_key: Bronze_Silver_earthquake
          depends_on:
            - task_key: Ingestion_to_bronze
          pipeline_task:
            pipeline_id: ${resources.pipelines.bronze_silver_earthquake_etl.id}
            full_refresh: false
        - task_key: EarthQuake_Dashboard
          depends_on:
            - task_key: Bronze_Silver_earthquake
          dashboard_task:
            subscription: {}
            warehouse_id: e0045679a42a6aa4
            dashboard_id: ${resources.dashboards.earthquake_monitor.id}
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.catalog}
      performance_target: PERFORMANCE_OPTIMIZED
